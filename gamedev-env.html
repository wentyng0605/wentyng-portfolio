<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Design | Lee Wen Tyng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #05070a; color: #ccc; }
        .section
        .env-hero { padding: 140px 24px 60px; text-align: center; background: radial-gradient(circle, rgba(45, 212, 191, 0.05) 0%, transparent 70%); }
        .wide-media { width: 100%; height: 500px; object-fit: cover; border-radius: 12px; margin: 40px 0; border: 1px solid rgba(255,255,255,0.1); }
        .env-container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
        .env-details { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; margin-bottom: 100px; }
    </style>
</head>
<body>
    <header id="header" class="scrolled">
        <nav class="navbar">
            <a href="gamedev.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Hub</a>
        </nav>
    </header>

    <main>
        <section class="env-hero">
            <p class="section-label" style="color: #2dd4bf;">World Building</p>
            <h1>Environment <em>Design</em></h1>
            <p>利用灯光叙事与空间构图构建沉浸式世界。</p>
        </section>

        <div class="env-container">
            <div class="reveal">
                <img src="assets/images/env-showcase1.jpg" alt="Level Design" class="wide-media">
                <div class="env-details">
                    <div class="env-meta">
                        <strong>Software:</strong> Unreal Engine 5<br>
                        <strong>Focus:</strong> Lighting & Foliage
                    </div>
                    <div>
                        <h3>Atmospheric Level Design</h3>
                        <p>通过实时光照系统（Lumen）营造具有叙事感的废墟场景。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
